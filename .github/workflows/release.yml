name: Release viewer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build web artifacts
        run: npm run verify

      - name: Package web artifacts
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          (cd dist-chromium && zip -r "../release-assets/legalize-kr-viewer-chromium-${version}.zip" .)
          (cd dist-firefox && zip -r "../release-assets/legalize-kr-viewer-firefox-${version}.zip" .)
          (cd dist-desktop && zip -r "../release-assets/legalize-kr-viewer-desktop-${version}.zip" .)
          echo "asset_dir=release-assets" >>"$GITHUB_OUTPUT"

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_DIR: ${{ steps.package.outputs.asset_dir }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "Legalize-KR Viewer release."
          fi
          gh release upload "$TAG_NAME" "$ASSET_DIR"/* --clobber

      # Publishes to the Chrome Web Store only when the required OAuth secrets
      # are configured. Add repository secrets CWS_EXTENSION_ID, CWS_CLIENT_ID,
      # CWS_CLIENT_SECRET and CWS_REFRESH_TOKEN to enable this step.
      - name: Publish to Chrome Web Store
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        if: ${{ env.CWS_EXTENSION_ID != '' }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          ZIP_NAME="release-assets/legalize-kr-viewer-chromium-${version}.zip"
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$ZIP_NAME" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish

  macos-app:
    runs-on: macos-latest
    needs: web-assets
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app bundle
        run: npm run desktop:build

      - name: Package macOS app bundle
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/Legalize-KR Viewer.app" \
            "release-assets/legalize-kr-viewer-macos-${version}.zip"
          echo "asset_dir=release-assets" >>"$GITHUB_OUTPUT"

      - name: Publish macOS Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_DIR: ${{ steps.package.outputs.asset_dir }}
        run: gh release upload "$TAG_NAME" "$ASSET_DIR"/* --clobber
