<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legalize-KR Viewer 설정</title>
    <link rel="icon" href="icons/icon-32.png" />
    <link rel="stylesheet" href="src/styles.css" />
    <script type="module" src="src/options.js"></script>
  </head>
  <body class="options-page">
    <main class="options-card">
      <h1>Legalize-KR Viewer 설정</h1>
      <p class="muted">확장 본 화면의 설정과 같은 저장소를 사용합니다. 접근 토큰은 이 브라우저 저장소에만 저장합니다.</p>

      <section class="notice-grid" aria-label="제품화 안내">
        <article class="notice">
          <strong>읽기 전용</strong>
          <p>이 확장은 Legalize-KR 원천 저장소를 수정하거나 원격에 업로드하지 않습니다.</p>
        </article>
        <article class="notice">
          <strong>권한</strong>
          <p>GitHub 원문, 로컬 Git 연결, 브라우저 저장소만 사용합니다.</p>
        </article>
        <article class="notice">
          <strong>요청 한도</strong>
          <p>GitHub 요청 한도에 걸리면 접근 토큰을 이 브라우저에 저장해 한도를 높일 수 있습니다.</p>
        </article>
        <article class="notice">
          <strong>개인정보</strong>
          <p>접근 토큰은 다른 기기와 동기화되는 저장소, 문서, 빌드 산출물에 저장하지 않습니다.</p>
        </article>
      </section>

      <label class="field">
        <span>GitHub 접근 토큰</span>
        <input id="optionsToken" type="password" autocomplete="off" />
      </label>
      <label class="field">
        <span>테마</span>
        <select id="optionsTheme">
          <option value="system">시스템 설정</option>
          <option value="light">밝게 보기</option>
          <option value="dark">어둡게 보기</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button id="optionsClear" class="button" type="button">삭제</button>
        <button id="optionsSave" class="button primary" type="button">저장</button>
      </div>
      <p id="optionsStatus" class="muted"></p>
    </main>
  </body>
</html>
